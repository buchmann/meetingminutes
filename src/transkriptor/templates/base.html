<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Transkriptor{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/css/app.css">
    <script src="/static/vendor/htmx.min.js"></script>
    <script src="/static/js/app.js" defer></script>
</head>
<body>
    <header class="container">
        <nav>
            <ul>
                <li><a href="/"><strong>Transkriptor</strong></a></li>
            </ul>
            {% if user %}
            <ul>
                <li><a href="/system" class="secondary"><small>System Utilization</small></a></li>
                <li><a href="/chat" class="secondary"><small>Text Improver</small></a></li>
                <li><a href="/settings" class="secondary"><small>Settings</small></a></li>
                {% if user.is_admin %}
                <li><a href="/admin/users" class="secondary"><small>Users</small></a></li>
                {% endif %}
                <li><small style="opacity:0.7">{{ user.username }}</small></li>
                <li>
                    <form method="post" action="/logout" style="margin:0">
                        <button class="secondary outline" style="margin:0;padding:0.2rem 0.7rem;font-size:0.8rem">Logout</button>
                    </form>
                </li>
            </ul>
            {% endif %}
        </nav>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="container">
        <small>Transkriptor v0.1.0 &mdash; All processing runs locally</small>
    </footer>
</body>
</html>
