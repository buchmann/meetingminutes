# Sync the LE wildcard from Vault into bum/bum-lab-tls-certificate (type kubernetes.io/tls).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wildcard-tls
  namespace: bum
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: bum-lab-tls-certificate
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
  data:
    - secretKey: tls.crt
      remoteRef: { key: certs/wildcard-allwaysbeginner, property: tls.crt }
    - secretKey: tls.key
      remoteRef: { key: certs/wildcard-allwaysbeginner, property: tls.key }
