# Real secret is applied out-of-band (not committed). Create with:
#   kubectl -n transkriptor create secret generic transkriptor-secrets \
#     --from-literal=TRANSKRIPTOR_ADMIN_PASSWORD='<strong-password>'
apiVersion: v1
kind: Secret
metadata:
  name: transkriptor-secrets
  namespace: transkriptor
type: Opaque
stringData:
  TRANSKRIPTOR_ADMIN_PASSWORD: "CHANGE_ME"
