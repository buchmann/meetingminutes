apiVersion: apps/v1
kind: Deployment
metadata:
  name: transkriptor
  namespace: transkriptor
  labels:
    app: transkriptor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transkriptor
  template:
    metadata:
      labels:
        app: transkriptor
    spec:
      containers:
        - name: transkriptor
          image: mbx1010/transkriptor:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: transkriptor-config
            - secretRef:
                name: transkriptor-secrets
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/livez
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: transkriptor-data
