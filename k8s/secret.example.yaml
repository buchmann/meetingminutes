# Real secret is applied out-of-band (not committed). Create with:
#   kubectl -n local-ai create secret generic local-ai-secrets \
#     --from-literal=LOCAL_AI_ADMIN_PASSWORD='<strong-password>'
apiVersion: v1
kind: Secret
metadata:
  name: local-ai-secrets
  namespace: local-ai
type: Opaque
stringData:
  LOCAL_AI_ADMIN_PASSWORD: "CHANGE_ME"
  # Fernet key for encrypting stored email account passwords (Email Digest).
  # Generate: python -c "import base64,os;print(base64.urlsafe_b64encode(os.urandom(32)).decode())"
  # Must stay stable, else stored email credentials can't be decrypted.
  LOCAL_AI_EMAIL_ENC_KEY: "CHANGE_ME_FERNET_KEY"
