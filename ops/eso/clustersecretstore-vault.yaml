# ESO → Vault (KV-v2 at secret/) on kubeflow (192.168.178.97).
# Auth: AppRole. role_id is filled below; secret_id lives in the k8s secret
# 'vault-approle' (external-secrets ns) — see ops/eso/README.md to create it.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-kv
spec:
  provider:
    vault:
      server: "https://192.168.178.97:8200"
      path: "secret"
      version: "v2"
      caBundle: ""
      auth:
        appRole:
          path: "approle"
          roleId: "REPLACE_WITH_ROLE_ID"
          secretRef:
            name: vault-approle
            namespace: external-secrets
            key: secret_id
