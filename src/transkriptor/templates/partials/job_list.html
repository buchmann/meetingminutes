{% if jobs %}
<figure>
<table>
    <thead>
        <tr>
            <th>File</th>
            <th>Duration</th>
            <th>Status</th>
            <th>Language</th>
            <th>Speakers</th>
            {% if shared_view %}<th>Shared by</th>{% endif %}
            <th>Created</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for job in jobs %}
        <tr>
            <td><a href="/jobs/{{ job.id }}">{{ job.filename }}</a></td>
            <td>
                {% if job.duration_secs %}
                {{ (job.duration_secs // 60)|int }}:{{ "%02d"|format((job.duration_secs % 60)|int) }}
                {% else %}&mdash;{% endif %}
            </td>
            <td>
                <span class="status-badge status-{{ job.status }}">
                    {% if job.status not in ('completed', 'failed') %}
                    <span aria-busy="true"></span>
                    {% endif %}
                    {{ job.status }}
                </span>
            </td>
            <td>{{ job.detected_language or '...' }}</td>
            <td>{{ job.speaker_count or '...' }}</td>
            {% if shared_view %}<td><small>{{ job.owner_username or '&mdash;' }}</small></td>{% endif %}
            <td>{{ job.created_at[:16] | replace('T', ' ') }}</td>
            <td style="white-space:nowrap">
                {% if not shared_view %}
                    {% if job.visibility == 'shared' %}
                    <button class="outline small share-btn" data-job-id="{{ job.id }}" data-shared="1">Unshare</button>
                    {% else %}
                    <button class="outline secondary small share-btn" data-job-id="{{ job.id }}" data-shared="0">Share</button>
                    {% endif %}
                    <button class="outline secondary small delete-btn" data-job-id="{{ job.id }}">Delete</button>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</figure>
{% else %}
<p>
    {% if shared_view %}
    Nothing has been shared yet.
    {% else %}
    No transcription jobs yet. Upload an audio file to get started.
    {% endif %}
</p>
{% endif %}
