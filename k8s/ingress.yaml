apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: local-ai
  namespace: local-ai
  annotations:
    # TLS: the publicly-trusted Let's Encrypt WILDCARD (*.lab.allwaysbeginner.com)
    # is used — NOT cert-manager. The wildcard is issued centrally by acme.sh
    # (DNS-01 via deSEC) on kubeflow (192.168.178.97), stored in Vault KV
    # (secret/certs/wildcard-allwaysbeginner), and copied into the local-ai-tls
    # secret (same manual flow as bum/gitlab; ESO not yet installed). On renewal
    # (~every 90d, currently exp 2026-09-23) re-copy the secret. Do NOT re-add a
    # cert-manager.io/cluster-issuer annotation — it would overwrite this with a
    # self-signed cert.
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "2g"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/client-body-timeout: "300"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - local-ai.lab.allwaysbeginner.com
      secretName: local-ai-tls
  rules:
    - host: local-ai.lab.allwaysbeginner.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: local-ai
                port:
                  number: 80
